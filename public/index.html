<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📍 나만의 위치 안내 & 주변 검색 서비스</title>

  <!-- Google Fonts (Noto Sans KR & Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      --card-bg: rgba(255, 255, 255, 0.98);
      --text-main: #0f172a;
      --text-sub: #475569;
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --primary-hover: #4338ca;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* 전체 앱 레이아웃 (반응형 2분할 구조) */
    .app-container {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 1280px;
      height: 90vh;
      min-height: 700px;
      display: grid;
      grid-template-columns: 420px 1fr;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    /* 좌측 사이드바 패널 (스크롤 가능) */
    .sidebar {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      height: 100%;
      overflow-y: auto;
    }

    header {
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      font-size: 1.65rem;
      font-weight: 800;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* 공통 섹션 스타일 */
    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .section:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    /* 1. Shadcn UI 스타일 셀렉트 드롭다운 컨테이너 */
    .select-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .select-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .select-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-sub);
    }

    /* Shadcn UI 미니멀 셀렉트 드롭다운 디자인 */
    .shadcn-select {
      width: 100%;
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background-color: #fff;
      color: var(--text-main);
      cursor: pointer;
      appearance: none; /* 브라우저 기본 화살표 숨김 */
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 12px center;
      background-repeat: no-repeat;
      background-size: 1.2rem;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .shadcn-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light);
    }

    .shadcn-select:disabled {
      background-color: #f8fafc;
      color: #64748b;
      cursor: not-allowed;
    }

    /* 2. 텍스트 검색란 & 추천 키워드 칩 */
    .search-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    /* Shadcn UI 인풋 필드 */
    .shadcn-input {
      flex: 1;
      padding: 10px 14px;
      font-size: 0.875rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background-color: #fff;
      color: var(--text-main);
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .shadcn-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light);
    }

    /* Shadcn UI 프라이머리 버튼 */
    .shadcn-btn {
      background-color: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .shadcn-btn:hover {
      background-color: var(--primary-hover);
    }

    /* 추천 검색어 칩 그룹 */
    .recommend-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .chip-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      background-color: #f1f5f9;
      border: 1px solid var(--border-color);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: all 0.15s ease;
    }

    .chip:hover {
      background-color: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-0.5px);
    }

    .chip.active {
      background-color: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* 3. 검색 결과 패널 */
    .results-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; /* flex 자식 스크롤 가능하게 처리 */
    }

    .results-header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .badge-count {
      background: #f1f5f9;
      color: var(--text-sub);
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
    }

    .btn-clear-search {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .btn-clear-search:hover {
      color: var(--primary);
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }

    /* 빈 상태 & 에러 정보 */
    .empty-state {
      text-align: center;
      padding: 30px 10px;
      color: var(--text-sub);
      font-size: 0.85rem;
      border: 1.5px dashed var(--border-color);
      border-radius: var(--radius-md);
      background: #f8fafc;
    }

    /* 결과 카드 디자인 */
    .result-card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 14px;
      transition: all 0.2s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .result-card.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .rc-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rc-distance {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      background: #fff;
      padding: 2px 6px;
      border: 1px solid var(--primary);
      border-radius: 999px;
    }

    .rc-address {
      font-size: 0.8rem;
      color: var(--text-sub);
      line-height: 1.4;
    }

    .rc-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .rc-link {
      font-size: 0.75rem;
      color: #fff;
      background: var(--primary);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 700;
      transition: background 0.15s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .rc-link:hover {
      background: var(--primary-hover);
    }

    /* 우측 지도 컨테이너 */
    .map-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-loading {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f1f5f9;
      color: var(--text-sub);
      font-size: 1rem;
      z-index: 10;
      font-weight: 500;
    }

    .map-loading.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    /* 지도 커스텀 오버레이 윈도우 스타일 */
    .custom-overlay {
      background: #fff;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--primary);
      padding: 10px 14px;
      position: relative;
      bottom: 50px;
      transform: translateX(-50%);
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .custom-overlay::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0;
      border-style: solid;
      border-color: var(--primary) transparent;
      display: block;
      width: 0;
    }

    .co-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .co-desc {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    /* 반응형 레이아웃 (모바일 대응) */
    @media (max-width: 900px) {
      body {
        padding: 0;
      }
      .app-container {
        grid-template-columns: 1fr;
        grid-template-rows: 40vh 60vh;
        height: 100vh;
        border-radius: 0;
      }
      .map-container {
        grid-row: 1;
      }
      .sidebar {
        grid-row: 2;
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 좌측 검색 & 리스트 사이드바 -->
    <aside class="sidebar">
      <header>
        <h1>📍 나만의 위치 안내 서비스</h1>
        <p class="subtitle">내 위치 또는 지정 지역 주변을 실시간 키워드 검색으로 자유롭게 탐색해 보세요.</p>
      </header>

      <!-- 1단계: Shadcn UI 스타일 셀렉터 공간 최적화 -->
      <section class="section">
        <div class="section-title">
          <span>1. 탐색 지역 지정</span>
        </div>
        <div class="select-container">
          <div class="select-group">
            <label for="select-zone" class="select-label">기본 권역 선택</label>
            <select id="select-zone" class="shadcn-select" onchange="handleZoneChange()">
              <option value="mylocation">📍 내 현재 위치 기준</option>
              <option value="incheon" selected>🟦 인천 권역</option>
              <option value="seoul">🟩 서울 권역</option>
            </select>
          </div>
          <div class="select-group" id="group-detail-place">
            <label for="select-place" class="select-label">상세 지점 선택</label>
            <select id="select-place" class="shadcn-select" onchange="handlePlaceChange()">
              <!-- 스크립트로 옵션 동적 추가 -->
            </select>
          </div>
        </div>
      </section>

      <!-- 2단계: 실시간 주변 텍스트 검색 & 추천 칩 -->
      <section class="section">
        <div class="section-title">
          <span>2. 주변 실시간 검색 (반경 1.5km)</span>
        </div>
        
        <!-- 자유 텍스트 검색 바 -->
        <div class="search-bar">
          <input type="text" id="search-input" aria-label="검색어 입력" class="shadcn-input" placeholder="원하는 장소나 키워드 입력..." onkeypress="handleSearchKeyPress(event)" />
          <button class="shadcn-btn" onclick="executeTextSearch()">
            <span>검색</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </div>

        <!-- 추천 검색 키워드 칩 목록 (가장 컴팩트하게 정렬) -->
        <div class="recommend-title">자주 찾는 장소 추천</div>
        <div class="chip-container" id="chip-container">
          <!-- 스크립트로 칩 목록 렌더링 -->
        </div>
      </section>

      <!-- 3단계: 검색 결과 리스트 -->
      <section class="section results-section">
        <div class="results-header-info">
          <div class="section-title" style="margin-bottom: 0;">
            3. 검색 결과 <span class="badge-count" id="result-count">0</span>
          </div>
          <button class="btn-clear-search hidden" id="btn-clear" onclick="clearSearch()">검색 초기화</button>
        </div>
        
        <div class="results-list" id="results-list">
          <div class="empty-state">장소명을 직접 검색하거나 추천 칩을 눌러 주변을 조회해 보세요!</div>
        </div>
      </section>
    </aside>

    <!-- 우측 카카오 맵 -->
    <main class="map-container">
      <div id="map"></div>
      <div class="map-loading" id="map-loading">지도를 불러오는 중…</div>
    </main>
  </div>

  <!-- 카카오 지도 SDK (서비스 라이브러리 추가) -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=012385551d235007080d46ee9ad59cb0&libraries=services&autoload=false"></script>
  
  <script>
    // 지역 데이터 구성 (위도 경도 값 중 마지막 0은 린트 오류를 위해 배제)
    const ZONES_DATA = {
      incheon: [
        { name: "계양구청", emoji: "🏛️", lat: 37.53727, lng: 126.73768, desc: "인천 계양구의 행정 중심지입니다." },
        { name: "계산역",   emoji: "🚇", lat: 37.5432,   lng: 126.7378,  desc: "인천1호선 계산역 일대 역세권 중심지입니다." },
        { name: "부평구청", emoji: "🏢", lat: 37.50739, lng: 126.72182, desc: "부평의 주요 행정 거점 구청입니다." },
        { name: "부평역",   emoji: "🛍️", lat: 37.4894,   lng: 126.7247,  desc: "부평의 핵심 상권이자 초역세권입니다." }
      ],
      seoul: [
        { name: "서울시청",   emoji: "🏛️", lat: 37.56654, lng: 126.97846, desc: "서울의 심장부, 행정과 역사의 교차로입니다." },
        { name: "강남역",     emoji: "🏙️", lat: 37.49794, lng: 127.02762, desc: "대한민국 최대 규모의 랜드마크 번화가입니다." },
        { name: "홍대입구역", emoji: "🎨", lat: 37.55736, lng: 126.92364, desc: "문화와 트렌드가 살아 숨쉬는 홍대입구역입니다." }
      ]
    };

    // 추천 카테고리 칩 정의
    const RECOMMEND_CHIPS = [
      { key: "주민센터", emoji: "🏛️" },
      { key: "병원", emoji: "🏥" },
      { key: "약국", emoji: "💊" },
      { key: "은행", emoji: "💵" },
      { key: "마트", emoji: "🛒" },
      { key: "맛집", emoji: "🍽️" },
      { key: "카페", emoji: "☕" },
      { key: "공원", emoji: "🌳" },
      { key: "등산", emoji: "⛰️" }
    ];

    let map;
    let placeServices;
    let selectedPlace = ZONES_DATA.incheon[0]; // 기본 중심: 계양구청
    let activeSearchKeyword = "";

    // 지도 리소스 관리용 변수
    let centerMarker = null; // 타겟팅된 중심점의 마커
    let searchMarkers = [];  // 실시간 조회 결과 장소들의 마커 리스트
    let customOverlays = []; // 활성화되어 노출 중인 커스텀 윈도우 오버레이들

    window.addEventListener("load", function () {
      if (typeof kakao === "undefined" || !kakao.maps) {
        document.getElementById("map-loading").textContent = "카카오 지도 SDK 로딩에 실패했습니다.";
        return;
      }
      kakao.maps.load(initMap);
    });

    // 지도 초기화 및 컴포넌트 렌더링
    function initMap() {
      const container = document.getElementById("map");
      const options = {
        center: new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng),
        level: 4
      };

      map = new kakao.maps.Map(container, options);
      placeServices = new kakao.maps.services.Places();

      // 지도 로딩 레이어 가리기
      document.getElementById("map-loading").classList.add("hidden");

      // 렌더 구성 요소 빌드
      updatePlaceOptions();
      renderRecommendChips();
      
      // 최초 구동 시 브라우저 Geolocation 기반 내 위치 조회 자동 시도
      tryAutoDetectLocation();
    }

    // 초기 실행 시 자동 위치 감지
    function tryAutoDetectLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            // 위치 수신 성공 시 권역 드롭다운을 '내 위치'로 자동 교체
            const zoneSelect = document.getElementById("select-zone");
            zoneSelect.value = "mylocation";
            
            // 상세 지역은 내 위치 기준이므로 숨김 처리
            document.getElementById("group-detail-place").style.display = "none";

            selectedPlace = {
              name: "내 현재 위치",
              emoji: "📍",
              lat: position.coords.latitude,
              lng: position.coords.longitude,
              desc: "브라우저 GPS 기기로 획득한 현재 사용자 실제 위치입니다."
            };

            focusOnPlace();

            document.getElementById("results-list").innerHTML = 
              '<div class="empty-state">🎉 내 현재 위치를 감지했습니다!<br>검색창에 장소명을 치거나 하단 칩을 눌러 주변을 조회하세요.</div>';
          },
          (error) => {
            // 실패 또는 권한 차단 시, 콤보박스의 기본선택값인 계양구청 유지
            console.log("초기 내 위치 획득 실패(기본값 유지):", error.message);
            updateCenterMarker();
          },
          { timeout: 3500 }
        );
      } else {
        updateCenterMarker();
      }
    }

    // 기본 권역 드롭다운 변경 시 호출
    function handleZoneChange() {
      const zoneSelect = document.getElementById("select-zone");
      const zoneKey = zoneSelect.value;
      
      clearSearch();

      if (zoneKey === "mylocation") {
        // 내 위치의 경우 상세지점 셀렉트 박스 숨김
        document.getElementById("group-detail-place").style.display = "none";
        getMyLocation();
      } else {
        // 인천 / 서울 선택 시 상세지점 셀렉트 활성화 및 세부 옵션 렌더링
        document.getElementById("group-detail-place").style.display = "flex";
        updatePlaceOptions();
        
        // 해당 권역의 첫 번째 지점을 기본값으로 선정
        selectedPlace = ZONES_DATA[zoneKey][0];
        focusOnPlace();
      }
    }

    // 상세지점 드롭다운 옵션 동적 갱신
    function updatePlaceOptions() {
      const zoneKey = document.getElementById("select-zone").value;
      const placeSelect = document.getElementById("select-place");
      placeSelect.innerHTML = "";

      if (zoneKey === "mylocation") return;

      ZONES_DATA[zoneKey].forEach((place, index) => {
        const opt = document.createElement("option");
        opt.value = index;
        opt.textContent = `${place.emoji} ${place.name}`;
        placeSelect.appendChild(opt);
      });
      placeSelect.value = 0;
    }

    // 상세 지점 드롭다운 선택 변경 시
    function handlePlaceChange() {
      const zoneKey = document.getElementById("select-zone").value;
      const placeIndex = document.getElementById("select-place").value;

      selectedPlace = ZONES_DATA[zoneKey][placeIndex];
      clearSearch();
      focusOnPlace();
    }

    // Geolocation 연동 수동 위치 획득
    function getMyLocation() {
      const listContainer = document.getElementById("results-list");
      listContainer.innerHTML = '<div class="empty-state">📡 현재 위치 정보(GPS)를 조회하고 있습니다...</div>';

      if (!navigator.geolocation) {
        alert("이 브라우저에서는 위치 서비스 기능이 지원되지 않습니다.");
        fallbackToIncheon();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          selectedPlace = {
            name: "내 현재 위치",
            emoji: "📍",
            lat: position.coords.latitude,
            lng: position.coords.longitude,
            desc: "브라우저 GPS 기기로 획득한 현재 사용자 실제 위치입니다."
          };
          focusOnPlace();
          listContainer.innerHTML = '<div class="empty-state">내 현재 위치 조회에 성공했습니다!<br>주변에서 찾고 싶은 키워드를 검색해 보세요.</div>';
        },
        (error) => {
          console.error(error);
          let msg = "위치 정보를 연동할 수 없습니다. ";
          if (error.code === error.PERMISSION_DENIED) {
            msg += "브라우저의 위치 조회 권한 요청이 차단되었습니다. 주소창 설정에서 권한을 승인해 주세요.";
          } else if (error.code === error.POSITION_UNAVAILABLE) {
            msg += "GPS 디바이스 신호를 가져올 수 없습니다.";
          } else if (error.code === error.TIMEOUT) {
            msg += "위치 정보 검색 시간이 초과되었습니다.";
          }
          alert(msg);
          fallbackToIncheon();
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
      );
    }

    // 위치 획득 에러 시 안전하게 기본값으로 환원
    function fallbackToIncheon() {
      const zoneSelect = document.getElementById("select-zone");
      zoneSelect.value = "incheon";
      document.getElementById("group-detail-place").style.display = "flex";
      updatePlaceOptions();
      selectedPlace = ZONES_DATA.incheon[0];
      focusOnPlace();
    }

    // 추천 카테고리 칩 UI 구성
    function renderRecommendChips() {
      const container = document.getElementById("chip-container");
      container.innerHTML = "";

      RECOMMEND_CHIPS.forEach(chip => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.innerHTML = `<span>${chip.emoji}</span><span>${chip.key}</span>`;
        btn.onclick = () => {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          
          // 검색창에 추천 키워드명을 채워주고 즉시 검색 수행
          document.getElementById("search-input").value = chip.key;
          executeTextSearch();
        };
        container.appendChild(btn);
      });
    }

    // 검색창 엔터키 입력 처리
    function handleSearchKeyPress(e) {
      if (e.key === 'Enter') {
        executeTextSearch();
      }
    }

    // 텍스트 키워드 검색 수행
    function executeTextSearch() {
      const inputVal = document.getElementById("search-input").value.trim();
      if (!inputVal) {
        alert("검색어를 입력해 주세요!");
        return;
      }

      activeSearchKeyword = inputVal;

      // 추천 칩 하이라이트 동기화 처리
      document.querySelectorAll('.chip').forEach(c => {
        if (c.textContent.includes(inputVal)) {
          c.classList.add('active');
        } else {
          c.classList.remove('active');
        }
      });

      searchPlaces();
    }

    // 현재 지정된 지점으로 맵 카메라 이동 및 마커 반영
    function focusOnPlace() {
      const pos = new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng);
      map.panTo(pos);
      updateCenterMarker();
    }

    // 지도 상에 위치한 중심 마커 갱신
    function updateCenterMarker() {
      if (centerMarker) {
        centerMarker.setMap(null);
      }

      const pos = new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng);
      let markerOptions = {
        position: pos,
        title: selectedPlace.name,
        zIndex: 5
      };

      // 내 위치 표식을 구별하기 위해 전용 스타 마커 적용
      if (selectedPlace.name === "내 현재 위치") {
        const imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png';
        const imageSize = new kakao.maps.Size(24, 35);
        markerOptions.image = new kakao.maps.MarkerImage(imageSrc, imageSize);
      }

      centerMarker = new kakao.maps.Marker(markerOptions);
      centerMarker.setMap(map);

      openOverlay(pos, `<strong>${selectedPlace.emoji} ${selectedPlace.name}</strong>`, selectedPlace.desc, true);
    }

    // 실시간 주변 장소 카카오맵 검색 요청
    function searchPlaces() {
      if (!selectedPlace || !activeSearchKeyword) return;

      const listContainer = document.getElementById("results-list");
      listContainer.innerHTML = '🔍 실시간으로 지도를 검색하고 있습니다...';
      document.getElementById("btn-clear").classList.remove("hidden");

      // 현재 기준 중심점의 1.5km 반경 설정
      const searchOptions = {
        location: new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng),
        radius: 1500,
        sort: kakao.maps.services.SortBy.ACCURACY
      };

      placeServices.keywordSearch(activeSearchKeyword, (data, status, pagination) => {
        clearSearchMarkers();

        if (status === kakao.maps.services.Status.OK) {
          renderSearchResults(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
          listContainer.innerHTML = `<div class="empty-state">😅 1.5km 반경 내에 '${activeSearchKeyword}' 결과가 없습니다.</div>`;
          document.getElementById("result-count").textContent = "0";
        } else {
          listContainer.innerHTML = '<div class="empty-state">❌ 검색 처리 도중 에러가 발생했습니다.</div>';
          document.getElementById("result-count").textContent = "0";
        }
      }, searchOptions);
    }

    // 검색 결과 목록 및 마커 지도 배치
    function renderSearchResults(places) {
      const listContainer = document.getElementById("results-list");
      listContainer.innerHTML = "";
      document.getElementById("result-count").textContent = places.length;

      const bounds = new kakao.maps.LatLngBounds();
      bounds.extend(new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng));

      places.forEach((place, index) => {
        const placePos = new kakao.maps.LatLng(place.y, place.x);
        bounds.extend(placePos);

        // 1. 카카오 지도 마커 드로잉
        const marker = new kakao.maps.Marker({
          position: placePos,
          clickable: true,
          zIndex: 3
        });
        marker.setMap(map);
        searchMarkers.push(marker);

        // 마커 클릭 이벤트 리스너 바인딩
        kakao.maps.event.addListener(marker, 'click', () => {
          highlightResultCard(index);
          openOverlay(placePos, place.place_name, place.road_address_name || place.address_name, false, place.place_url);
          map.panTo(placePos);
        });

        // 2. 검색 결과 목록 카드 드로잉
        const card = document.createElement("div");
        card.className = "result-card";
        card.id = `result-card-${index}`;

        // 거리 단위 문자열 보정
        let distStr = "";
        const rawDist = Number.parseInt(place.distance, 10);
        if (!Number.isNaN(rawDist)) {
          distStr = rawDist >= 1000 ? `${(rawDist / 1000).toFixed(1)}km` : `${rawDist}m`;
        }

        card.innerHTML = `
          <div class="rc-title">
            <span>${place.place_name}</span>
            ${distStr ? `<span class="rc-distance">${distStr}</span>` : ''}
          </div>
          <div class="rc-address">${place.road_address_name || place.address_name}</div>
          <div class="rc-actions">
            <a href="${place.place_url}" target="_blank" class="rc-link">
              <span>카카오맵 상세</span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            </a>
          </div>
        `;

        card.onclick = (e) => {
          if (e.target.closest('.rc-link')) return; // 아웃링크 버튼 클릭 시 동작 스킵

          highlightResultCard(index);
          openOverlay(placePos, place.place_name, place.road_address_name || place.address_name, false, place.place_url);
          map.panTo(placePos);
        };

        listContainer.appendChild(card);
      });

      // 검색 마커들을 모두 포함하도록 지도의 시야 범위 강제 재배치
      map.setBounds(bounds);
    }

    // 커스텀 오버레이 윈도우 생성
    function openOverlay(position, title, desc, isCenter = false, url = null) {
      closeAllOverlays();

      const content = document.createElement('div');
      content.className = 'custom-overlay';
      
      if (isCenter) {
        content.style.borderColor = 'var(--primary)';
        content.innerHTML = `
          <div class="co-title" style="color:var(--primary); font-size: 0.95rem;">${title}</div>
          <div class="co-desc">${desc}</div>
        `;
      } else {
        content.style.borderColor = '#64748b';
        content.innerHTML = `
          <div class="co-title">${title}</div>
          <div class="co-desc">${desc}</div>
          ${url ? `<a href="${url}" target="_blank" style="font-size: 10px; color: var(--primary); text-decoration: underline; margin-top: 4px; font-weight: 700;">상세 정보 페이지 보기</a>` : ''}
        `;
      }

      const overlay = new kakao.maps.CustomOverlay({
        content: content,
        position: position,
        yAnchor: 1
      });

      overlay.setMap(map);
      customOverlays.push(overlay);
    }

    // 좌측 결과 리스트 액티브 하이라이트 동기화
    function highlightResultCard(activeIndex) {
      document.querySelectorAll('.result-card').forEach(card => {
        card.classList.remove('active');
      });
      const targetCard = document.getElementById(`result-card-${activeIndex}`);
      if (targetCard) {
        targetCard.classList.add('active');
        targetCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // 오버레이 윈도우 소거
    function closeAllOverlays() {
      customOverlays.forEach(overlay => overlay.setMap(null));
      customOverlays = [];
    }

    // 검색 마커 및 오버레이 초기화
    function clearSearchMarkers() {
      searchMarkers.forEach(marker => marker.setMap(null));
      searchMarkers = [];
      closeAllOverlays();
    }

    // 검색 전체 초기화 및 지도 초기 중심 복원
    function clearSearch() {
      clearSearchMarkers();
      activeSearchKeyword = "";
      document.getElementById("search-input").value = "";
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      
      const listContainer = document.getElementById("results-list");
      listContainer.innerHTML = '<div class="empty-state">장소명을 직접 검색하거나 추천 칩을 눌러 주변을 조회해 보세요!</div>';
      document.getElementById("result-count").textContent = "0";
      document.getElementById("btn-clear").classList.add("hidden");

      if (map && selectedPlace) {
        const pos = new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng);
        map.setLevel(4);
        map.panTo(pos);
        updateCenterMarker();
      }
    }
  </script>
</body>
</html>
