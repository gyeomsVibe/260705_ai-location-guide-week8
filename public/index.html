<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📍 나만의 위치 안내 서비스</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #eef2f7;
      --card: #ffffff;
      --text: #1f2937;
      --text-sub: #6b7280;
      --incheon: #2563eb;   /* 인천 권역 색 */
      --seoul: #059669;     /* 서울 권역 색 */
      --line: #e5e7eb;
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 24px 14px;
      line-height: 1.5;
    }

    .container {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 32px 28px;
      max-width: 820px;
      width: 100%;
    }

    /* 1. 큰 제목 */
    header { text-align: center; margin-bottom: 8px; }
    h1 { font-size: 2.4rem; font-weight: 900; color: var(--text); }
    .subtitle { font-size: 1.15rem; color: var(--text-sub); margin-top: 8px; }

    /* 7. 안내 문구 */
    .guide {
      background: #f0f7ff;
      border: 1px solid #d6e6ff;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 1.05rem;
      color: #1d4ed8;
      text-align: center;
      margin: 22px 0;
      font-weight: 500;
    }

    /* 2. 중앙에 크게 보이는 지도 */
    .map-wrap { position: relative; }
    #map {
      width: 100%;
      height: 440px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #dfe4ea;
    }
    .map-loading {
      position: absolute; inset: 0;
      display: flex; justify-content: center; align-items: center;
      color: var(--text-sub); font-size: 1.05rem;
      background: #dfe4ea; border-radius: 16px;
    }
    .map-loading.hidden { display: none; }

    /* 4. 선택된 장소 설명 카드 */
    .place-card {
      margin-top: 20px;
      border: 2px solid var(--incheon);
      border-radius: 16px;
      padding: 22px 24px;
      background: #f8fafc;
      transition: border-color 0.2s ease;
    }
    .place-card .pc-name { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
    .place-card .pc-zone {
      display: inline-block;
      font-size: 0.9rem; font-weight: 700; color: #fff;
      background: var(--incheon);
      padding: 3px 12px; border-radius: 999px;
      margin-bottom: 12px;
    }
    .place-card .pc-desc { font-size: 1.1rem; color: #374151; }

    /* 권역 그룹 */
    .zone-block { margin-top: 26px; }
    .zone-title {
      font-size: 1.25rem; font-weight: 900;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .zone-dot { width: 14px; height: 14px; border-radius: 50%; }

    /* 3. 큼직한 장소 버튼 */
    .place-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
    }
    .place-btn {
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 22px 14px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      min-height: 96px; justify-content: center;
    }
    .place-btn .pb-emoji { font-size: 1.9rem; }
    .place-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow); }

    /* 권역별 강조색 */
    .zone-incheon .place-btn.active { border-color: var(--incheon); background: #eff5ff; color: var(--incheon); }
    .zone-seoul   .place-btn.active { border-color: var(--seoul);   background: #ecfdf5; color: var(--seoul); }

    .footer-note {
      margin-top: 28px; text-align: center;
      font-size: 0.95rem; color: var(--text-sub);
    }

    /* 5. 모바일 대응 */
    @media (max-width: 600px) {
      .container { padding: 24px 18px; }
      h1 { font-size: 1.9rem; }
      #map { height: 320px; }
      .place-grid { grid-template-columns: repeat(2, 1fr); }
      .place-btn { font-size: 1.1rem; padding: 18px 10px; min-height: 84px; }
      .place-card .pc-name { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <main class="container">
    <!-- 1. 큰 제목 -->
    <header>
      <h1>📍 나만의 위치 안내 서비스</h1>
      <p class="subtitle">우리 동네부터 서울까지, 버튼 하나로 위치를 안내해 드립니다.</p>
    </header>

    <!-- 7. 안내 문구 -->
    <div class="guide">👇 아래 <b>지역 버튼</b>을 누르면, 지도가 그곳으로 이동하고 장소 설명이 카드에 표시됩니다.</div>

    <!-- 2. 중앙 큰 지도 -->
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-loading" id="map-loading">지도를 불러오는 중…</div>
    </div>

    <!-- 4. 선택된 장소 설명 카드 -->
    <div class="place-card" id="place-card">
      <span class="pc-zone" id="pc-zone">인천 권역</span>
      <div class="pc-name" id="pc-name">🏛️ 계양구청</div>
      <div class="pc-desc" id="pc-desc">인천 계양구의 행정 중심지입니다. 오늘 안내의 기본 위치예요.</div>
    </div>

    <!-- 3. 권역별 큼직한 장소 버튼 -->
    <div id="zones"></div>

    <p class="footer-note">💡 지도는 카카오맵으로 표시됩니다 · 지역을 눌러 위치를 확인해 보세요.</p>
  </main>

  <!-- 카카오 지도 SDK -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=012385551d235007080d46ee9ad59cb0&autoload=false"></script>
  <script>
    // 지역별 권역 데이터 (인천 계양구 중심 + 부평구 + 서울)
    const ZONES = [
      {
        zone: "인천 권역", key: "incheon", color: "#2563eb", css: "zone-incheon",
        places: [
          { name: "계양구청", emoji: "🏛️", lat: 37.53727, lng: 126.73768, desc: "인천 계양구의 행정 중심지입니다. 오늘 안내의 기본 위치예요." },
          { name: "계산역",   emoji: "🚇", lat: 37.54320, lng: 126.73780, desc: "인천1호선 계산역 일대로, 계양구의 대표 번화가입니다." },
          { name: "부평구청", emoji: "🏢", lat: 37.50739, lng: 126.72182, desc: "인천 부평구의 행정 중심지입니다." },
          { name: "부평역",   emoji: "🛍️", lat: 37.48940, lng: 126.72470, desc: "1호선과 인천지하철이 만나는 부평의 중심 상권입니다." }
        ]
      },
      {
        zone: "서울 권역", key: "seoul", color: "#059669", css: "zone-seoul",
        places: [
          { name: "서울시청",   emoji: "🏛️", lat: 37.56654, lng: 126.97846, desc: "서울의 중심, 시청 광장이 있는 곳입니다." },
          { name: "강남역",     emoji: "🏙️", lat: 37.49794, lng: 127.02762, desc: "유동인구가 가장 많은 강남의 핵심 랜드마크입니다." },
          { name: "홍대입구역", emoji: "🎨", lat: 37.55736, lng: 126.92364, desc: "젊음과 예술의 거리, 홍대입구입니다." }
        ]
      }
    ];

    let map, marker;

    window.addEventListener("load", function () {
      if (typeof kakao === "undefined" || !kakao.maps) {
        document.getElementById("map-loading").textContent = "지도를 불러오지 못했습니다. 잠시 후 새로고침해 주세요.";
        return;
      }
      kakao.maps.load(initMap);
    });

    function initMap() {
      const first = ZONES[0].places[0]; // 기본: 계양구청
      map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(first.lat, first.lng),
        level: 5
      });
      marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(first.lat, first.lng) });
      marker.setMap(map);

      document.getElementById("map-loading").classList.add("hidden");
      renderZones();
    }

    function renderZones() {
      const wrap = document.getElementById("zones");
      wrap.innerHTML = "";
      ZONES.forEach(function (z) {
        const block = document.createElement("div");
        block.className = "zone-block " + z.css;

        const title = document.createElement("div");
        title.className = "zone-title";
        title.innerHTML = '<span class="zone-dot" style="background:' + z.color + '"></span>' + z.zone;
        block.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "place-grid";
        z.places.forEach(function (p, i) {
          const btn = document.createElement("button");
          btn.className = "place-btn";
          btn.innerHTML = '<span class="pb-emoji">' + p.emoji + '</span><span>' + p.name + '</span>';
          // 기본 선택: 첫 권역 첫 장소
          if (z === ZONES[0] && i === 0) btn.classList.add("active");
          btn.onclick = function () { selectPlace(z, p, btn); };
          grid.appendChild(btn);
        });
        block.appendChild(grid);
        wrap.appendChild(block);
      });
    }

    function selectPlace(zone, place, btn) {
      // 버튼 활성 상태 갱신
      document.querySelectorAll(".place-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      // 지도 이동 + 마커 이동
      const pos = new kakao.maps.LatLng(place.lat, place.lng);
      map.panTo(pos);
      marker.setPosition(pos);

      // 설명 카드 갱신 (권역 색상 반영)
      const card = document.getElementById("place-card");
      card.style.borderColor = zone.color;
      const zoneTag = document.getElementById("pc-zone");
      zoneTag.textContent = zone.zone;
      zoneTag.style.background = zone.color;
      document.getElementById("pc-name").textContent = place.emoji + " " + place.name;
      document.getElementById("pc-desc").textContent = place.desc;
    }
  </script>
</body>
</html>
