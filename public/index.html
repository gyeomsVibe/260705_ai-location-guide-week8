<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧭 테마별 나들이 코스 추천</title>

  <!-- 프리미엄 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
      --primary-color: #3b82f6;
      --primary-hover: #60a5fa;
      --accent-color: #10b981;
      --route-color: #a78bfa;
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 36px;
      max-width: 960px;
      width: 100%;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    header { text-align: center; }

    h1 {
      font-size: 2.3rem;
      font-weight: 900;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .description { font-size: 1.05rem; color: var(--text-sub); line-height: 1.6; }

    .step-label {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text-sub);
      margin-bottom: 10px;
    }
    .step-label b { color: var(--primary-hover); }

    /* 선택 칩 */
    .chips { display: flex; flex-wrap: wrap; gap: 10px; }

    .chip {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      color: var(--text-main);
      padding: 10px 18px;
      font-size: 0.98rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .chip:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--primary-hover); }
    .chip.active {
      background: rgba(59, 130, 246, 0.18);
      border-color: var(--primary-color);
      box-shadow: 0 0 14px rgba(59, 130, 246, 0.3);
    }

    /* 테마 카드 그리드 */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    .theme-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 16px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }
    .theme-card:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
    .theme-card.active {
      background: rgba(167, 139, 250, 0.15);
      border-color: var(--route-color);
      box-shadow: 0 0 14px rgba(167, 139, 250, 0.3);
    }
    .theme-emoji { font-size: 1.8rem; }
    .theme-name { font-size: 0.92rem; font-weight: 600; }

    /* 액션 버튼 */
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-main {
      flex: 1;
      min-width: 200px;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      border: none;
      border-radius: 14px;
      color: #fff;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }
    .btn-main:hover { opacity: 0.92; }
    .btn-main:active { transform: scale(0.99); }
    .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: var(--text-main);
      padding: 16px 20px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.1); }

    /* 지도 */
    .map-container {
      position: relative;
      width: 100%;
      height: 440px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    #map { width: 100%; height: 100%; background: #1e293b; }

    .map-overlay {
      position: absolute; inset: 0;
      background: rgba(15, 23, 42, 0.85);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 12px; z-index: 10; text-align: center; padding: 20px;
      transition: opacity 0.3s ease;
    }
    .map-overlay.hidden { opacity: 0; pointer-events: none; }
    .overlay-title { font-size: 1.3rem; font-weight: 700; color: var(--primary-hover); }
    .overlay-desc { color: var(--text-sub); font-size: 0.95rem; line-height: 1.5; }
    .spinner {
      width: 38px; height: 38px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: var(--primary-hover);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 지도 위 번호 핀 */
    .course-pin {
      width: 30px; height: 30px; border-radius: 50% 50% 50% 0;
      background: var(--primary-color);
      transform: rotate(-45deg);
      display: flex; justify-content: center; align-items: center;
      border: 2px solid #fff;
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }
    .course-pin span { transform: rotate(45deg); color: #fff; font-weight: 800; font-size: 0.9rem; }
    .course-pin.start { background: var(--accent-color); }

    /* 코스 요약 */
    .course-summary {
      display: none;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(167, 139, 250, 0.25);
      border-radius: 14px;
      padding: 16px 20px;
    }
    .course-summary.show { display: flex; }
    .summary-title { font-size: 1.15rem; font-weight: 800; }
    .summary-stat { font-size: 0.9rem; color: var(--text-sub); }
    .summary-stat b { color: var(--text-main); font-weight: 700; }

    /* 코스 리스트 */
    .course-list { display: flex; flex-direction: column; gap: 12px; }
    .stop-card {
      display: flex; gap: 14px; align-items: flex-start;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .stop-card:hover { border-color: var(--primary-hover); background: rgba(15, 23, 42, 0.6); }
    .stop-num {
      flex-shrink: 0;
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex; justify-content: center; align-items: center;
      font-weight: 800; font-size: 1rem; color: #fff;
    }
    .stop-body { flex: 1; min-width: 0; }
    .stop-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .stop-name small { font-size: 0.8rem; color: var(--accent-color); font-weight: 600; margin-left: 6px; }
    .stop-meta { font-size: 0.88rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 8px; word-break: keep-all; }
    .stop-link { font-size: 0.86rem; color: var(--primary-hover); text-decoration: none; font-weight: 600; }
    .stop-link:hover { text-decoration: underline; }

    .empty-msg { text-align: center; color: var(--text-sub); padding: 10px; font-size: 0.95rem; }

    .footer-tip { font-size: 0.82rem; color: var(--text-sub); text-align: center; opacity: 0.8; line-height: 1.6; }

    @media (max-width: 680px) {
      .container { padding: 24px 20px; }
      h1 { font-size: 1.8rem; }
      .theme-grid { grid-template-columns: repeat(3, 1fr); }
      .map-container { height: 340px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>🧭 테마별 나들이 코스 추천</h1>
      <p class="description">지역과 테마만 고르면, 걷기 좋은 순서로 <b>맞춤 코스</b>를 지도에 그려드립니다.</p>
    </header>

    <!-- 1단계: 지역 -->
    <section>
      <div class="step-label"><b>STEP 1</b> · 어느 동네에서 놀까요?</div>
      <div class="chips" id="region-chips"></div>
    </section>

    <!-- 2단계: 테마 -->
    <section>
      <div class="step-label"><b>STEP 2</b> · 오늘의 테마는?</div>
      <div class="theme-grid" id="theme-grid"></div>
    </section>

    <!-- 액션 -->
    <div class="actions">
      <button class="btn-main" id="recommend-btn" disabled>🎲 코스 추천받기</button>
      <button class="btn-ghost" id="location-btn">📍 내 위치로</button>
    </div>

    <!-- 지도 -->
    <div class="map-container">
      <div id="map"></div>
      <div class="map-overlay" id="map-overlay">
        <span class="overlay-title">🗺️ 지도를 불러오는 중…</span>
        <p class="overlay-desc">지역과 테마를 선택하고 <b>코스 추천받기</b>를 눌러보세요.</p>
      </div>
    </div>

    <!-- 코스 요약 -->
    <div class="course-summary" id="course-summary">
      <span class="summary-title" id="summary-title"></span>
      <span class="summary-stat" id="summary-stat"></span>
    </div>

    <!-- 코스 리스트 -->
    <div class="course-list" id="course-list"></div>

    <p class="footer-tip">
      💡 장소 정보는 카카오 지도에서 실시간으로 가져옵니다 · 카드를 누르면 지도에서 위치를 확인할 수 있어요<br />
      걷는 순서는 출발지(초록 핀)에서 가까운 곳부터 이어지도록 자동 계산됩니다.
    </p>
  </main>

  <!-- 카카오 지도 SDK (services 라이브러리 포함 · 장소 검색용) -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=012385551d235007080d46ee9ad59cb0&libraries=services&autoload=false"></script>
  <script>
    // ===== 앱 데이터 =====

    // 추천 지역(출발 중심점)
    const REGIONS = [
      { key: "hongdae",  name: "홍대",   lat: 37.55634, lng: 126.92364 },
      { key: "gangnam",  name: "강남",   lat: 37.49794, lng: 127.02762 },
      { key: "seongsu",  name: "성수",   lat: 37.54460, lng: 127.05590 },
      { key: "samcheong",name: "삼청·경복궁", lat: 37.57960, lng: 126.97700 },
      { key: "yeouido",  name: "여의도", lat: 37.52150, lng: 126.92430 },
      { key: "yeonnam",  name: "연남",   lat: 37.56290, lng: 126.92550 }
    ];

    // 테마별 검색 조건 (카카오 카테고리 코드 + 키워드 조합)
    // 카테고리 코드: FD6 음식점, CE7 카페, AT4 관광명소, CT1 문화시설
    const THEMES = [
      { key: "food",    emoji: "🍜", name: "맛집 투어",
        searches: [ {type:"category", code:"FD6"}, {type:"keyword", query:"맛집"} ] },
      { key: "cafe",    emoji: "☕", name: "카페·디저트",
        searches: [ {type:"category", code:"CE7"}, {type:"keyword", query:"디저트"} ] },
      { key: "healing", emoji: "🌳", name: "힐링 산책",
        searches: [ {type:"keyword", query:"공원"}, {type:"category", code:"AT4"} ] },
      { key: "date",    emoji: "💕", name: "데이트 코스",
        searches: [ {type:"category", code:"CE7"}, {type:"category", code:"AT4"}, {type:"category", code:"FD6"} ] },
      { key: "culture", emoji: "🎨", name: "문화 나들이",
        searches: [ {type:"category", code:"CT1"}, {type:"category", code:"AT4"} ] }
    ];

    const MAX_STOPS = 5;      // 코스 정거장 수
    const SEARCH_RADIUS = 1500; // 검색 반경(m)

    // ===== 앱 상태 =====
    const state = { region: null, theme: null };
    let map, places, overlays = [], routeLine = null;

    // ===== 초기화 =====
    window.addEventListener("load", function () {
      if (typeof kakao === "undefined" || !kakao.maps) {
        showOverlay("⚠️ 지도를 불러오지 못했습니다", "카카오 도메인 등록 상태를 확인해 주세요.");
        return;
      }
      kakao.maps.load(initApp);
    });

    function initApp() {
      // 지도 생성 (기본 중심: 홍대)
      map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(REGIONS[0].lat, REGIONS[0].lng),
        level: 5
      });
      places = new kakao.maps.services.Places();

      renderRegionChips();
      renderThemeCards();
      hideOverlay(); // 지도 준비 완료

      document.getElementById("recommend-btn").addEventListener("click", buildCourse);
      document.getElementById("location-btn").addEventListener("click", useMyLocation);
    }

    // ===== UI 렌더링 =====
    function renderRegionChips() {
      const box = document.getElementById("region-chips");
      box.innerHTML = "";
      REGIONS.forEach(function (r) {
        const el = document.createElement("button");
        el.className = "chip";
        el.textContent = r.name;
        el.onclick = function () {
          state.region = r;
          document.querySelectorAll("#region-chips .chip").forEach(c => c.classList.remove("active"));
          el.classList.add("active");
          if (map) map.panTo(new kakao.maps.LatLng(r.lat, r.lng));
          refreshButton();
        };
        box.appendChild(el);
      });
    }

    function renderThemeCards() {
      const box = document.getElementById("theme-grid");
      box.innerHTML = "";
      THEMES.forEach(function (t) {
        const el = document.createElement("div");
        el.className = "theme-card";
        el.innerHTML = '<div class="theme-emoji">' + t.emoji + '</div><div class="theme-name">' + t.name + '</div>';
        el.onclick = function () {
          state.theme = t;
          document.querySelectorAll("#theme-grid .theme-card").forEach(c => c.classList.remove("active"));
          el.classList.add("active");
          refreshButton();
        };
        box.appendChild(el);
      });
    }

    function refreshButton() {
      document.getElementById("recommend-btn").disabled = !(state.region && state.theme);
    }

    // ===== 내 위치 =====
    function useMyLocation() {
      if (!navigator.geolocation) { alert("이 브라우저는 위치 기능을 지원하지 않습니다."); return; }
      showOverlay("📍 현재 위치를 찾는 중…", "위치 권한을 허용해 주세요.");
      navigator.geolocation.getCurrentPosition(
        function (pos) {
          const r = { key: "myloc", name: "내 위치", lat: pos.coords.latitude, lng: pos.coords.longitude };
          state.region = r;
          document.querySelectorAll("#region-chips .chip").forEach(c => c.classList.remove("active"));
          map.panTo(new kakao.maps.LatLng(r.lat, r.lng));
          hideOverlay();
          refreshButton();
          if (state.theme) buildCourse();
        },
        function () { hideOverlay(); alert("위치를 가져오지 못했습니다. 동네를 직접 선택해 주세요."); }
      );
    }

    // ===== 코스 만들기 =====
    async function buildCourse() {
      if (!state.region || !state.theme) return;
      clearMap();
      showOverlay("🔎 " + state.theme.name + " 코스를 짜는 중…", "잠시만 기다려 주세요.");
      document.getElementById("course-summary").classList.remove("show");
      document.getElementById("course-list").innerHTML = "";

      const center = new kakao.maps.LatLng(state.region.lat, state.region.lng);

      // 테마의 모든 검색을 병렬 실행 후 합치기
      const arrays = await Promise.all(state.theme.searches.map(s => runSearch(s, center)));
      let candidates = [].concat.apply([], arrays);

      // 중복 제거(장소 id 기준)
      const seen = {};
      candidates = candidates.filter(function (p) {
        if (seen[p.id]) return false;
        seen[p.id] = true;
        return true;
      });

      if (candidates.length === 0) {
        hideOverlay();
        document.getElementById("course-list").innerHTML =
          '<p class="empty-msg">이 지역에서는 해당 테마의 장소를 찾지 못했어요. 다른 동네나 테마를 골라보세요.</p>';
        return;
      }

      // 중심에서 가까운 순 정렬 → 상위 후보 중 무작위 샘플(재추천 시 변화)
      const c = { lat: state.region.lat, lng: state.region.lng };
      candidates.sort((a, b) => distMeters(c, toLL(a)) - distMeters(c, toLL(b)));
      let pool = candidates.slice(0, 14);
      shuffle(pool);
      pool = pool.slice(0, Math.min(8, pool.length));

      // 출발점에서 가까운 곳부터 이어붙이는 동선(최근접 이웃)
      const course = orderByNearest(c, pool, MAX_STOPS);

      renderCourse(course);
      hideOverlay();
    }

    // 카카오 장소 검색 1건을 Promise로 감싸기
    function runSearch(s, center) {
      return new Promise(function (resolve) {
        const opts = {
          location: center,
          radius: SEARCH_RADIUS,
          size: 15,
          sort: kakao.maps.services.SortBy.DISTANCE
        };
        const cb = function (data, status) {
          resolve(status === kakao.maps.services.Status.OK ? data : []);
        };
        if (s.type === "category") places.categorySearch(s.code, cb, opts);
        else places.keywordSearch(s.query, cb, opts);
      });
    }

    // ===== 코스 렌더링 =====
    function renderCourse(stops) {
      const bounds = new kakao.maps.LatLngBounds();
      const path = [];
      const startLL = new kakao.maps.LatLng(state.region.lat, state.region.lng);
      path.push(startLL);
      bounds.extend(startLL);

      stops.forEach(function (p, i) {
        const ll = new kakao.maps.LatLng(parseFloat(p.y), parseFloat(p.x));
        path.push(ll);
        bounds.extend(ll);

        // 번호 핀
        const pin = document.createElement("div");
        pin.className = "course-pin";
        pin.innerHTML = "<span>" + (i + 1) + "</span>";
        const overlay = new kakao.maps.CustomOverlay({ position: ll, content: pin, yAnchor: 1, zIndex: 5 });
        overlay.setMap(map);
        overlays.push(overlay);
      });

      // 출발지 핀(초록)
      const startPin = document.createElement("div");
      startPin.className = "course-pin start";
      startPin.innerHTML = "<span>출</span>";
      const startOverlay = new kakao.maps.CustomOverlay({ position: startLL, content: startPin, yAnchor: 1, zIndex: 6 });
      startOverlay.setMap(map);
      overlays.push(startOverlay);

      // 동선(폴리라인)
      routeLine = new kakao.maps.Polyline({
        path: path,
        strokeWeight: 4,
        strokeColor: "#a78bfa",
        strokeOpacity: 0.9,
        strokeStyle: "shortdash"
      });
      routeLine.setMap(map);

      map.setBounds(bounds, 40, 40, 40, 40);

      // 요약
      const walkMin = Math.max(1, Math.round(routeLine.getLength() / 67)); // 도보 약 67m/분
      document.getElementById("summary-title").textContent = state.theme.emoji + " " + state.region.name + " · " + state.theme.name;
      document.getElementById("summary-stat").innerHTML =
        "총 <b>" + stops.length + "곳</b> · 예상 도보 <b>약 " + walkMin + "분</b> · 총 <b>" + Math.round(routeLine.getLength()) + "m</b>";
      document.getElementById("course-summary").classList.add("show");

      // 리스트
      const list = document.getElementById("course-list");
      list.innerHTML = "";
      stops.forEach(function (p, i) {
        const ll = new kakao.maps.LatLng(parseFloat(p.y), parseFloat(p.x));
        const card = document.createElement("div");
        card.className = "stop-card";
        const cat = (p.category_name || "").split(">").pop().trim();
        const addr = p.road_address_name || p.address_name || "";
        card.innerHTML =
          '<div class="stop-num">' + (i + 1) + '</div>' +
          '<div class="stop-body">' +
            '<div class="stop-name">' + escapeHtml(p.place_name) + (cat ? ' <small>' + escapeHtml(cat) + '</small>' : '') + '</div>' +
            '<div class="stop-meta">' + escapeHtml(addr) + '</div>' +
            '<a class="stop-link" href="' + p.place_url + '" target="_blank" rel="noopener">카카오맵에서 보기 →</a>' +
          '</div>';
        card.onclick = function (e) {
          if (e.target.classList.contains("stop-link")) return;
          map.panTo(ll);
          map.setLevel(3);
        };
        list.appendChild(card);
      });
    }

    // ===== 지도 정리 =====
    function clearMap() {
      overlays.forEach(o => o.setMap(null));
      overlays = [];
      if (routeLine) { routeLine.setMap(null); routeLine = null; }
    }

    // ===== 오버레이(로딩/안내) =====
    function showOverlay(title, desc) {
      const o = document.getElementById("map-overlay");
      o.querySelector(".overlay-title").textContent = title;
      o.querySelector(".overlay-desc").innerHTML = desc;
      o.classList.remove("hidden");
    }
    function hideOverlay() { document.getElementById("map-overlay").classList.add("hidden"); }

    // ===== 유틸 =====
    function toLL(p) { return { lat: parseFloat(p.y), lng: parseFloat(p.x) }; }

    function distMeters(a, b) {
      const R = 6371000, rad = Math.PI / 180;
      const dLat = (b.lat - a.lat) * rad, dLng = (b.lng - a.lng) * rad;
      const s = Math.sin(dLat / 2) ** 2 +
        Math.cos(a.lat * rad) * Math.cos(b.lat * rad) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(s));
    }

    // 출발점에서 가장 가까운 장소를 차례로 이어붙임
    function orderByNearest(start, items, maxStops) {
      const remaining = items.slice();
      const ordered = [];
      let curr = start;
      while (ordered.length < maxStops && remaining.length) {
        let bi = 0, bd = Infinity;
        remaining.forEach(function (it, i) {
          const d = distMeters(curr, toLL(it));
          if (d < bd) { bd = d; bi = i; }
        });
        const next = remaining.splice(bi, 1)[0];
        ordered.push(next);
        curr = toLL(next);
      }
      return ordered;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, function (m) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m];
      });
    }
  </script>
