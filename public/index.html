<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📍 나만의 위치 안내 & 주변 검색 서비스</title>

  <!-- Google Fonts (Noto Sans KR & Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #0f172a;
      --text-sub: #475569;
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --primary-hover: #4338ca;
      --life-color: #0d9488;
      --life-light: #f0fdfa;
      --meet-color: #ea580c;
      --meet-light: #fff7ed;
      --border-color: #e2e8f0;
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* 전체 앱 레이아웃 (반응형 2분할 구조) */
    .app-container {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 1280px;
      height: 90vh;
      min-height: 700px;
      display: grid;
      grid-template-columns: 420px 1fr;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
    }

    /* 좌측 사이드바 패널 (스크롤 가능) */
    .sidebar {
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      height: 100%;
      overflow-y: auto;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-sub);
      margin-top: 6px;
      line-height: 1.4;
    }

    /* 공통 섹션 스타일 */
    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .section:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    /* 1. 지역 선택 (인천 / 서울 권역 탭 및 버튼) */
    .zone-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      background: #f1f5f9;
      padding: 4px;
      border-radius: var(--radius-sm);
    }

    .zone-tab {
      flex: 1;
      background: none;
      border: none;
      padding: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-sub);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
    }

    .zone-tab.active {
      background: #fff;
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .place-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .place-btn {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 12px 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .place-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .place-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
    }

    /* 2. 카테고리 검색 버튼 그룹 */
    .cat-group {
      margin-bottom: 14px;
    }

    .cat-group-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
    }

    .cat-btn {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 10px 4px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cat-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .cat-btn.life:hover, .cat-btn.life.active {
      border-color: var(--life-color);
      background: var(--life-light);
      color: var(--life-color);
    }

    .cat-btn.meet:hover, .cat-btn.meet.active {
      border-color: var(--meet-color);
      background: var(--meet-light);
      color: var(--meet-color);
    }

    .cat-btn .cat-emoji {
      font-size: 1.2rem;
    }

    /* 3. 검색 결과 패널 */
    .results-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; /* flex 자식 스크롤 가능하게 처리 */
    }

    .results-header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .badge-count {
      background: #f1f5f9;
      color: var(--text-sub);
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
    }

    .btn-clear-search {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .btn-clear-search:hover {
      color: var(--primary);
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }

    /* 빈 상태 & 에러 정보 */
    .empty-state {
      text-align: center;
      padding: 30px 10px;
      color: var(--text-sub);
      font-size: 0.85rem;
      border: 1.5px dashed var(--border-color);
      border-radius: var(--radius-md);
      background: #f8fafc;
    }

    /* 결과 카드 디자인 */
    .result-card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 14px;
      transition: all 0.2s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .result-card.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .rc-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rc-distance {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      background: #fff;
      padding: 2px 6px;
      border: 1px solid var(--primary);
      border-radius: 999px;
    }

    .rc-address {
      font-size: 0.8rem;
      color: var(--text-sub);
      line-height: 1.4;
    }

    .rc-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .rc-link {
      font-size: 0.75rem;
      color: #fff;
      background: var(--primary);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 700;
      transition: background 0.15s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .rc-link:hover {
      background: var(--primary-hover);
    }

    /* 우측 지도 컨테이너 */
    .map-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-loading {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f1f5f9;
      color: var(--text-sub);
      font-size: 1rem;
      z-index: 10;
      font-weight: 500;
    }

    .map-loading.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    /* 지도 커스텀 오버레이 윈도우 스타일 */
    .custom-overlay {
      background: #fff;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--primary);
      padding: 10px 14px;
      position: relative;
      bottom: 50px;
      transform: translateX(-50%);
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .custom-overlay::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0;
      border-style: solid;
      border-color: var(--primary) transparent;
      display: block;
      width: 0;
    }

    .co-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .co-desc {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    /* 반응형 레이아웃 (모바일 대응) */
    @media (max-width: 900px) {
      body {
        padding: 0;
      }
      .app-container {
        grid-template-columns: 1fr;
        grid-template-rows: 40vh 60vh;
        height: 100vh;
        border-radius: 0;
      }
      .map-container {
        grid-row: 1;
      }
      .sidebar {
        grid-row: 2;
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 좌측 검색 & 리스트 사이드바 -->
    <aside class="sidebar">
      <header>
        <h1>📍 나만의 위치 안내 서비스</h1>
        <p class="subtitle">지도를 클릭하거나 카테고리를 눌러 주변 주요 장소를 실시간으로 조회하세요.</p>
      </header>

      <!-- 1단계: 지역 선택 -->
      <section class="section">
        <div class="section-title">
          <span>1. 지역(권역) 선택</span>
        </div>
        <div class="zone-tabs" id="zone-tabs">
          <button class="zone-tab active" onclick="switchZone('incheon')">인천 권역</button>
          <button class="zone-tab" onclick="switchZone('seoul')">서울 권역</button>
        </div>
        <div class="place-grid" id="place-grid">
          <!-- 스크립트로 버튼 렌더링 -->
        </div>
      </section>

      <!-- 2단계: 실시간 주변 카테고리 검색 -->
      <section class="section">
        <div class="section-title">
          <span>2. 주변 실시간 검색 (반경 1.5km)</span>
        </div>
        
        <!-- 생활 행정 그룹 -->
        <div class="cat-group">
          <div class="cat-group-title">🏛️ 생활·행정</div>
          <div class="cat-grid" id="cat-life-grid">
            <!-- 동적 렌더링 -->
          </div>
        </div>

        <!-- 모임 나들이 그룹 -->
        <div class="cat-group" style="margin-bottom: 0;">
          <div class="cat-group-title">🥕 모임·나들이 (벙개)</div>
          <div class="cat-grid" id="cat-meet-grid">
            <!-- 동적 렌더링 -->
          </div>
        </div>
      </section>

      <!-- 3단계: 검색 결과 리스트 -->
      <section class="section results-section">
        <div class="results-header-info">
          <div class="section-title" style="margin-bottom: 0;">
            3. 검색 결과 <span class="badge-count" id="result-count">0</span>
          </div>
          <button class="btn-clear-search hidden" id="btn-clear" onclick="clearSearch()">검색 초기화</button>
        </div>
        
        <div class="results-list" id="results-list">
          <div class="empty-state">위 지역 및 카테고리를 선택해 실시간 조회를 해보세요!</div>
        </div>
      </section>
    </aside>

    <!-- 우측 카카오 맵 -->
    <main class="map-container">
      <div id="map"></div>
      <div class="map-loading" id="map-loading">지도를 불러오는 중…</div>
    </main>
  </div>

  <!-- 카카오 지도 SDK (서비스 라이브러리 추가) -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=012385551d235007080d46ee9ad59cb0&libraries=services&autoload=false"></script>
  
  <script>
    // 지역 데이터 구성
    const ZONES_DATA = {
      incheon: [
        { name: "계양구청", emoji: "🏛️", lat: 37.53727, lng: 126.73768, desc: "인천 계양구의 행정 중심지입니다." },
        { name: "계산역",   emoji: "🚇", lat: 37.54320, lng: 126.73780, desc: "인천1호선 계산역 일대 역세권 중심지입니다." },
        { name: "부평구청", emoji: "🏢", lat: 37.50739, lng: 126.72182, desc: "부평의 주요 행정 거점 구청입니다." },
        { name: "부평역",   emoji: "🛍️", lat: 37.48940, lng: 126.72470, desc: "부평의 핵심 상권이자 초역세권입니다." }
      ],
      seoul: [
        { name: "서울시청",   emoji: "🏛️", lat: 37.56654, lng: 126.97846, desc: "서울의 심장부, 행정과 역사의 교차로입니다." },
        { name: "강남역",     emoji: "🏙️", lat: 37.49794, lng: 127.02762, desc: "대한민국 최대 규모의 랜드마크 번화가입니다." },
        { name: "홍대입구역", emoji: "🎨", lat: 37.55736, lng: 126.92364, desc: "문화와 트렌드가 살아 숨쉬는 홍대입구역입니다." }
      ]
    };

    // 카테고리 정의
    const LIFE_CATEGORIES = [
      { key: "주민센터", name: "주민센터", emoji: "🏛️" },
      { key: "병원", name: "병원", emoji: "🏥" },
      { key: "약국", name: "약국", emoji: "💊" },
      { key: "은행", name: "은행", emoji: "💵" },
      { key: "마트", name: "마트", emoji: "🛒" }
    ];

    const MEET_CATEGORIES = [
      { key: "맛집", name: "맛집", emoji: "🍽️" },
      { key: "카페", name: "카페", emoji: "☕" },
      { key: "공원", name: "산책(공원)", emoji: "🌳" },
      { key: "등산", name: "등산", emoji: "⛰️" }
    ];

    let map;
    let placeServices;
    let currentZoneKey = 'incheon';
    let selectedPlace = ZONES_DATA.incheon[0]; // 기본: 계양구청
    let selectedCategory = null;

    // 지도 요소 관리
    let centerMarker = null; // 선택된 중심 지역의 마커
    let searchMarkers = [];  // 검색된 카테고리 장소들의 마커 배열
    let customOverlays = []; // 현재 표시 중인 오버레이 윈도우 배열

    window.addEventListener("load", function () {
      if (typeof kakao === "undefined" || !kakao.maps) {
        document.getElementById("map-loading").textContent = "카카오 지도 SDK를 로드하는 데 실패했습니다.";
        return;
      }
      kakao.maps.load(initMap);
    });

    // 지도 및 기본 요소 초기화
    function initMap() {
      const container = document.getElementById("map");
      const options = {
        center: new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng),
        level: 4
      };

      map = new kakao.maps.Map(container, options);
      placeServices = new kakao.maps.services.Places();

      // 지도 로딩 안내 숨기기
      document.getElementById("map-loading").classList.add("hidden");

      // 렌더링 시작
      renderPlaces();
      renderCategories();
      updateCenterMarker();
    }

    // 권역 탭 토글
    function switchZone(zoneKey) {
      currentZoneKey = zoneKey;
      document.querySelectorAll('.zone-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.classList.add('active');

      // 선택된 권역의 첫 번째 장소를 기본값으로 설정
      selectedPlace = ZONES_DATA[zoneKey][0];
      
      // 검색 기록 초기화 및 렌더링 갱신
      clearSearch();
      renderPlaces();
      focusOnPlace();
    }

    // 세부 장소 버튼 렌더링
    function renderPlaces() {
      const container = document.getElementById("place-grid");
      container.innerHTML = "";

      ZONES_DATA[currentZoneKey].forEach(place => {
        const btn = document.createElement("button");
        btn.className = "place-btn";
        if (selectedPlace.name === place.name) {
          btn.classList.add("active");
        }
        btn.innerHTML = `<span>${place.emoji}</span><span>${place.name}</span>`;
        btn.onclick = () => {
          document.querySelectorAll('.place-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedPlace = place;
          
          clearSearch(); // 지역을 옮겼으므로 검색결과 초기화
          focusOnPlace();
        };
        container.appendChild(btn);
      });
    }

    // 카테고리 버튼 렌더링
    function renderCategories() {
      const lifeContainer = document.getElementById("cat-life-grid");
      const meetContainer = document.getElementById("cat-meet-grid");

      lifeContainer.innerHTML = "";
      meetContainer.innerHTML = "";

      // 생활·행정 버튼 렌더링
      LIFE_CATEGORIES.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-btn life";
        btn.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><span>${cat.name}</span>`;
        btn.onclick = () => selectCategory(cat, btn);
        lifeContainer.appendChild(btn);
      });

      // 모임·나들이 버튼 렌더링
      MEET_CATEGORIES.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-btn meet";
        btn.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><span>${cat.name}</span>`;
        btn.onclick = () => selectCategory(cat, btn);
        meetContainer.appendChild(btn);
      });
    }

    // 카테고리 클릭 핸들러
    function selectCategory(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCategory = cat;

      // 실시간 검색 가동
      searchPlaces();
    }

    // 현재 선택된 장소(중심)로 지도 이동 및 마커 업데이트
    function focusOnPlace() {
      const pos = new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng);
      map.panTo(pos);
      updateCenterMarker();
    }

    // 중심 마커 업데이트
    function updateCenterMarker() {
      if (centerMarker) {
        centerMarker.setMap(null);
      }

      const pos = new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng);
      
      // 중심 마커는 빨간색 또는 다른 구별용 마커 이미지 지정 가능
      // 여기서는 기본 마커를 사용하되 타이틀 지정
      centerMarker = new kakao.maps.Marker({
        position: pos,
        title: selectedPlace.name,
        zIndex: 5
      });
      centerMarker.setMap(map);

      // 중심지 커스텀 정보창 띄우기
      openOverlay(pos, `<strong>${selectedPlace.emoji} ${selectedPlace.name}</strong>`, selectedPlace.desc, true);
    }

    // 실시간 주변 장소 검색 실행
    function searchPlaces() {
      if (!selectedPlace || !selectedCategory) return;

      // 로딩 상태 표시
      const listContainer = document.getElementById("results-list");
      listContainer.innerHTML = '<div class="empty-state">🔍 실시간으로 주변을 검색하고 있습니다...</div>';
      document.getElementById("btn-clear").classList.remove("hidden");

      // 검색 옵션 (중심점 위치 기준 1.5km 반경)
      const options = {
        location: new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng),
        radius: 1500,
        sort: kakao.maps.services.SortBy.ACCURACY
      };

      // 카테고리 검색 수행
      placeServices.keywordSearch(selectedCategory.key, (data, status, pagination) => {
        clearSearchMarkers();

        if (status === kakao.maps.services.Status.OK) {
          renderSearchResults(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
          listContainer.innerHTML = `<div class="empty-state">😅 근처 1.5km 내에 '${selectedCategory.name}' 검색 결과가 없습니다.</div>`;
          document.getElementById("result-count").textContent = "0";
        } else {
          listContainer.innerHTML = '<div class="empty-state">❌ 검색 중 오류가 발생했습니다. 다시 시도해 주세요.</div>';
          document.getElementById("result-count").textContent = "0";
        }
      }, options);
    }

    // 검색 결과 리스트 및 마커 표출
    function renderSearchResults(places) {
      const listContainer = document.getElementById("results-list");
      listContainer.innerHTML = "";
      document.getElementById("result-count").textContent = places.length;

      // 지도 범위 재설정을 위한 LatLngBounds
      const bounds = new kakao.maps.LatLngBounds();
      bounds.extend(new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng)); // 중심점 포함

      places.forEach((place, index) => {
        const placePos = new kakao.maps.LatLng(place.y, place.x);
        bounds.extend(placePos);

        // 1. 지도에 마커 등록
        const marker = new kakao.maps.Marker({
          position: placePos,
          clickable: true,
          zIndex: 3
        });
        marker.setMap(map);
        searchMarkers.push(marker);

        // 마커 클릭 이벤트 연동
        kakao.maps.event.addListener(marker, 'click', () => {
          highlightResultCard(index);
          openOverlay(placePos, place.place_name, place.road_address_name || place.address_name, false, place.place_url);
          map.panTo(placePos);
        });

        // 2. 좌측 목록 아이템 카드 추가
        const card = document.createElement("div");
        card.className = "result-card";
        card.id = `result-card-${index}`;

        // 미터/킬로미터 단위 변환
        let distStr = "";
        const rawDist = parseInt(place.distance);
        if (!isNaN(rawDist)) {
          distStr = rawDist >= 1000 ? `${(rawDist / 1000).toFixed(1)}km` : `${rawDist}m`;
        }

        card.innerHTML = `
          <div class="rc-title">
            <span>${place.place_name}</span>
            ${distStr ? `<span class="rc-distance">${distStr}</span>` : ''}
          </div>
          <div class="rc-address">${place.road_address_name || place.address_name}</div>
          <div class="rc-actions">
            <a href="${place.place_url}" target="_blank" class="rc-link">
              <span>카카오맵 상세</span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            </a>
          </div>
        `;

        card.onclick = (e) => {
          // 카카오맵 상세 링크 클릭 시에는 카드가 클릭된 지도 이동 등이 일어나지 않도록 함
          if (e.target.closest('.rc-link')) return;

          highlightResultCard(index);
          openOverlay(placePos, place.place_name, place.road_address_name || place.address_name, false, place.place_url);
          map.panTo(placePos);
        };

        listContainer.appendChild(card);
      });

      // 검색된 모든 지점들이 보이도록 지도 영역 확장 및 부드럽게 조정
      map.setBounds(bounds);
    }

    // 커스텀 오버레이(툴팁) 창 열기
    function openOverlay(position, title, desc, isCenter = false, url = null) {
      closeAllOverlays();

      const content = document.createElement('div');
      content.className = 'custom-overlay';
      
      if (isCenter) {
        content.style.borderColor = 'var(--primary)';
        content.innerHTML = `
          <div class="co-title" style="color:var(--primary); font-size: 0.95rem;">${title}</div>
          <div class="co-desc">${desc}</div>
        `;
      } else {
        content.style.borderColor = '#64748b';
        content.innerHTML = `
          <div class="co-title">${title}</div>
          <div class="co-desc">${desc}</div>
          ${url ? `<a href="${url}" target="_blank" style="font-size: 10px; color: var(--primary); text-decoration: underline; margin-top: 4px; font-weight: 700;">상세 페이지 보기</a>` : ''}
        `;
      }

      const overlay = new kakao.maps.CustomOverlay({
        content: content,
        position: position,
        yAnchor: 1
      });

      overlay.setMap(map);
      customOverlays.push(overlay);
    }

    // 결과 카드 하이라이트 활성화
    function highlightResultCard(activeIndex) {
      document.querySelectorAll('.result-card').forEach(card => {
        card.classList.remove('active');
      });
      const targetCard = document.getElementById(`result-card-${activeIndex}`);
      if (targetCard) {
        targetCard.classList.add('active');
        // 부드럽게 스크롤로 보여주기
        targetCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // 모든 커스텀 오버레이 닫기
    function closeAllOverlays() {
      customOverlays.forEach(overlay => overlay.setMap(null));
      customOverlays = [];
    }

    // 기존 검색 마커만 전부 삭제
    function clearSearchMarkers() {
      searchMarkers.forEach(marker => marker.setMap(null));
      searchMarkers = [];
      closeAllOverlays();
    }

    // 검색 결과 및 마커 완전 초기화
    function clearSearch() {
      clearSearchMarkers();
      selectedCategory = null;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      
      // 검색 결과 영역 초기화
      const listContainer = document.getElementById("results-list");
      listContainer.innerHTML = '<div class="empty-state">위 지역 및 카테고리를 선택해 실시간 조회를 해보세요!</div>';
      document.getElementById("result-count").textContent = "0";
      document.getElementById("btn-clear").classList.add("hidden");

      // 지도를 다시 선택된 지역의 중심으로 복원
      if (map && selectedPlace) {
        const pos = new kakao.maps.LatLng(selectedPlace.lat, selectedPlace.lng);
        map.setLevel(4);
        map.panTo(pos);
        updateCenterMarker();
      }
    }
  </script>
</body>
</html>
